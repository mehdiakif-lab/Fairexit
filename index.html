<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

  <body>
    <nav>
      <a href="index.html">Home</a> |
      <a href="upload.html">Upload</a>
    </nav>
    <br>

    <h1>Upload Your Severance Document</h1>

    <p>Please upload your severance agreement or termination letter. We will analyze it securely and privately.</p>

    <form action="#" method="post" enctype="multipart/form-data">
      <label for="file">Choose a file:</label><br><br>
      <input type="file" id="file" name="file" accept=".pdf,.doc,.docx,.jpg,.png" required><br><br>

      <button type="submit">Upload & Analyze</button>
    </form>

    <p style="color:#666;font-size:0.9rem;margin-top:20px">
      Your document is processed securely. Nothing is stored.
    </p>
  </body>
</html>
