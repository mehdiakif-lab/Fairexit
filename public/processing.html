<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Processing – ExitFair</title>
    <link rel="stylesheet" href="styles/main.css">

    <script>
      const jobId = new URLSearchParams(window.location.search).get("jobId");

      async function checkStatus() {
        const res = await fetch(`/api/result?jobId=${jobId}`);
        const data = await res.json();

        if (data.status === "done") {
          window.location.href = `result.html?jobId=${jobId}`;
        }
      }

      setInterval(checkStatus, 3000);
    </script>
  </head>

  <body>
    <h1>Processing your document…</h1>
    <p>Please wait while we analyze your severance agreement.</p>
    <div class="spinner"></div>
  </body>
</html>
