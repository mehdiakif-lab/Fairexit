<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Results – ExitFair</title>
    <link rel="stylesheet" href="styles/main.css">

    <script>
      const jobId = new URLSearchParams(window.location.search).get("jobId");

      async function loadResult() {
        const res = await fetch(`/api/result?jobId=${jobId}`);
        const data = await res.json();
        document.getElementById("analysis").innerText = data.analysis || "No analysis found.";
      }

      loadResult();
    </script>
  </head>

  <body class="hero-bg">

    <nav>
      <a href="index.html">Home</a> |
      <a href="upload.html">Upload</a>
    </nav>

    <div class="hero-container">
      <div class="hero-card">

        <h1>Your Analysis</h1>

        <div class="result-box">
          <pre id="analysis"></pre>
        </div>

        <a href="upload.html" class="cta-button">Analyze another document</a>

      </div>
    </div>

  </body>
</html>
