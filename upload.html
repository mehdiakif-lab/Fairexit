<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Your Severance Package – Fairexit</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f7f7f7;
            color: #333;
            text-align: center;
        }
        header {
            padding: 40px 20px;
            background: #ffffff;
            border-bottom: 1px solid #ddd;
        }
        h1 {
            margin: 0;
            font-size: 2rem;
        }
        p {
            margin-top: 10px;
            font-size: 1.1rem;
            color: #555;
        }
        .container {
            margin: 40px auto;
            padding: 30px;
            background: #fff;
            width: 90%;
            max-width: 500px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        input[type="file"] {
            margin-top: 20px;
            font-size: 1rem;
        }
        button {
            margin-top: 30px;
            padding: 12px 24px;
            background: #0078ff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
        }
        button:hover {
            background: #005fcc;
        }
        .back {
            margin-top: 20px;
            display: inline-block;
            color: #0078ff;
            text-decoration: none;
        }
        .back:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header>
    <h1>Upload Your Severance Package</h1>
    <p>Your document will be analyzed securely using AI.</p>
</header>

<div class="container">
    <form>
        <input type="file" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg" required>
        <button type="submit">Analyze Document</button>
    </form>

    <a class="back" href="index.html">← Back to Homepage</a>
</div>

</body>
</html>
